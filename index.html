<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Kharcha</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#242438;--surface3:#2e2e4a;
  --accent:#7c6aff;--text:#f0eeff;--text2:#9890cc;--text3:#5c5680;
  --danger:#ff4757;--success:#00d4aa;--warn:#ffb347;
  --fh:'Syne',system-ui,sans-serif;--fb:'DM Sans',system-ui,sans-serif;
  --r:16px;--rs:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.nav{display:flex;border-bottom:1px solid rgba(124,106,255,0.15);background:var(--surface);flex-shrink:0}
.nb{flex:1;padding:14px 8px 10px;background:none;border:none;color:var(--text2);font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.nb.active{color:var(--accent)}
.nb.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}
.ni{font-size:18px}
.screen{display:none;flex:1;overflow-y:auto;padding:16px 16px 32px;-webkit-overflow-scrolling:touch}
.screen.active{display:block}
.ptitle{font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:20px;letter-spacing:-0.5px}
.ptitle span{color:var(--accent)}
.lbl{font-size:11px;font-weight:600;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;display:block}
.drow{display:flex;gap:8px;margin-bottom:10px}
.dbtn{flex:1;padding:11px 6px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--rs);color:var(--text2);font-family:var(--fb);font-size:13px;cursor:pointer;text-align:center}
.dbtn.active{border-color:var(--accent);color:var(--accent)}
.datedisp{background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--rs);padding:11px 12px;font-size:14px;color:var(--text);margin-bottom:20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.catgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.catbtn{padding:12px 6px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--rs);color:var(--text2);font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.15s}
.catbtn:active{transform:scale(0.95)}
.catbtn.sel{border-color:var(--accent);color:var(--text);background:rgba(124,106,255,0.15)}
.cico{font-size:22px;line-height:1}
.scrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.scbtn{padding:6px 14px;background:var(--surface2);border:1px solid var(--surface3);border-radius:20px;color:var(--text2);font-size:12px;cursor:pointer}
.scbtn.sel{background:rgba(124,106,255,0.2);border-color:var(--accent);color:var(--accent)}
.amtwrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--rs);overflow:hidden;margin-bottom:20px}
.amtwrap:focus-within{border-color:var(--accent)}
.curr{padding:0 14px;color:var(--text2);font-size:18px;font-weight:600;border-right:1px solid var(--surface3);flex-shrink:0}
input[type=number]{flex:1;background:none;border:none;padding:14px 12px;color:var(--text);font-family:var(--fh);font-size:22px;font-weight:600;outline:none;width:100%;min-width:0}
input[type=number]::placeholder{color:var(--text3)}
input[type=number]::-webkit-inner-spin-button{display:none}
textarea{width:100%;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:14px;padding:12px;resize:none;outline:none;margin-bottom:20px;line-height:1.5}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text3)}
.savebtn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--fh);font-size:16px;font-weight:700;cursor:pointer}
.savebtn:active{transform:scale(0.98)}
.savebtn.ok{background:var(--success)}
.savebtn.err{background:var(--danger)}
.fbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fpill{padding:7px 14px;background:var(--surface2);border:1px solid var(--surface3);border-radius:20px;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap}
.fpill.active{background:rgba(124,106,255,0.2);border-color:var(--accent);color:var(--accent)}
.dgrp{margin-bottom:20px}
.dhdr{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
.ecard{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative}
.ecard:active{border-color:var(--accent)}
.eico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.ename{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eamt{font-family:var(--fh);font-size:15px;font-weight:700;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--warn);position:absolute;top:10px;right:10px}
.sdot.ok{background:var(--success)}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.scard{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--r);padding:20px;margin-bottom:16px}
.scard h3{font-family:var(--fh);font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text)}
.sstat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface3)}
.sstat:last-child{border-bottom:none}
.sslbl{font-size:13px;color:var(--text2)}
.ssval{font-size:14px;font-weight:500;color:var(--text)}
.synbtn{width:100%;padding:14px;background:var(--surface2);border:1.5px solid var(--accent);border-radius:var(--r);color:var(--accent);font-family:var(--fh);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px}
.synbtn.sec{border-color:var(--text3);color:var(--text2)}
.urlinp{display:flex;gap:8px;margin-bottom:6px}
input[type=text]{flex:1;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:13px;padding:10px 12px;outline:none}
input[type=text]:focus{border-color:var(--accent)}
.saveurlbtn{padding:10px 16px;background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.stmsg{font-size:13px;padding:10px 14px;border-radius:var(--rs);text-align:center;margin-top:10px}
.stmsg.ok{background:rgba(0,212,170,0.15);color:var(--success)}
.stmsg.err{background:rgba(255,71,87,0.15);color:var(--danger)}
.stmsg.info{background:rgba(124,106,255,0.15);color:var(--accent)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:480px;margin:0 auto;max-height:85vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtitle{font-family:var(--fh);font-size:18px;font-weight:700;color:var(--text)}
.mclose{background:var(--surface2);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px}
.mactions{display:flex;gap:10px;margin-top:16px}
.delbtn{flex:1;padding:13px;background:rgba(255,71,87,0.15);border:1px solid var(--danger);border-radius:var(--rs);color:var(--danger);font-size:14px;cursor:pointer}
.updbtn{flex:2;padding:13px;background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:var(--fh);font-size:14px;font-weight:600;cursor:pointer}
.cat-transport{background:rgba(55,138,221,0.2);color:#85b7eb}
.cat-food{background:rgba(99,153,34,0.2);color:#97c459}
.cat-shopping{background:rgba(212,83,126,0.2);color:#ed93b1}
.cat-beauty{background:rgba(0,180,255,0.2);color:#60d4f5}
.cat-health{background:rgba(0,212,170,0.15);color:#00d4aa}
.cat-entertainment{background:rgba(124,106,255,0.2);color:#a99fff}
.cat-service{background:rgba(186,117,23,0.2);color:#ef9f27}
.cat-bills{background:rgba(216,90,48,0.2);color:#f0997b}
.cat-gifting{background:rgba(255,107,157,0.2);color:#ff6b9d}
.cat-tax{background:rgba(255,107,157,0.2);color:#ff6b9d}
.cat-extra{background:rgba(150,150,150,0.2);color:#aaaaaa}
</style>
</head>
<body>
<div id="app">
  <nav class="nav">
    <button class="nb active" id="nav-add" onclick="show('add')"><span class="ni">＋</span><span>Add</span></button>
    <button class="nb" id="nav-history" onclick="show('history')"><span class="ni">☰</span><span>History</span></button>
    <button class="nb" id="nav-sync" onclick="show('sync')"><span class="ni">⇅</span><span>Sync</span></button>
  </nav>

  <!-- ADD -->
  <div class="screen active" id="screen-add">
    <div class="ptitle">Add <span>Expense</span></div>
    <label class="lbl">Date</label>
    <div class="drow">
      <button class="dbtn active" id="btn-today" onclick="setDate('today')">Today</button>
      <button class="dbtn" id="btn-yesterday" onclick="setDate('yesterday')">Yesterday</button>
    </div>
    <div class="datedisp" id="date-disp" onclick="pickDate()">
      <span id="date-disp-text">—</span>
      <span style="font-size:11px;color:var(--text3)">tap to change ▾</span>
    </div>
    <input type="date" id="expense-date" style="position:absolute;left:-9999px;opacity:0" onchange="onDatePick()">
    <label class="lbl">Category</label>
    <div class="catgrid" id="cat-grid"></div>
    <div id="subcat-wrap" style="display:none">
      <label class="lbl">Sub-category</label>
      <div class="scrow" id="subcat-row"></div>
    </div>
    <label class="lbl">Amount (₹)</label>
    <div class="amtwrap">
      <span class="curr">₹</span>
      <input type="number" id="expense-amount" placeholder="0" inputmode="decimal">
    </div>
    <label class="lbl">Note (optional)</label>
    <textarea id="expense-comment" rows="2" placeholder="What's this for?"></textarea>
    <button class="savebtn" id="save-btn" onclick="saveExpense()">Save Expense</button>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="ptitle">History</div>
    <div class="fbar" id="filter-bar"></div>
    <div id="history-list"></div>
  </div>

  <!-- SYNC -->
  <div class="screen" id="screen-sync">
    <div class="ptitle">Sync</div>
    <div class="scard">
      <h3>Laptop Server URL</h3>
      <div class="urlinp">
        <input type="text" id="server-url" placeholder="http://192.168.1.x:8000">
        <button class="saveurlbtn" onclick="saveUrl()">Save</button>
      </div>
      <p style="font-size:11px;color:var(--text3);margin-top:4px">Include http:// — run python server.py on laptop first</p>
    </div>
    <div class="scard">
      <h3>Status</h3>
      <div class="sstat"><span class="sslbl">Total records</span><span class="ssval" id="stat-total">—</span></div>
      <div class="sstat"><span class="sslbl">Pending sync</span><span class="ssval" id="stat-pending">—</span></div>
      <div class="sstat"><span class="sslbl">Last synced</span><span class="ssval" id="stat-last">Never</span></div>
    </div>
    <button class="synbtn" onclick="doSync()">⇅  Sync Now</button>
    <button class="synbtn sec" onclick="exportJSON()">↓  Export JSON backup</button>
    <div id="sync-msg"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="edit-modal" onclick="overlayClick(event)">
  <div class="modal">
    <div class="mhdr">
      <span class="mtitle">Edit Expense</span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <label class="lbl">Date</label>
    <input type="date" id="edit-date" style="background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:14px;padding:11px 12px;width:100%;outline:none;color-scheme:dark;margin-bottom:16px">
    <label class="lbl">Category</label>
    <div class="catgrid" id="edit-cat-grid" style="margin-bottom:16px"></div>
    <label class="lbl">Sub-category</label>
    <div class="scrow" id="edit-subcat-row" style="margin-bottom:16px;min-height:20px"></div>
    <label class="lbl">Amount (₹)</label>
    <div class="amtwrap" style="margin-bottom:16px">
      <span class="curr">₹</span>
      <input type="number" id="edit-amount" placeholder="0" inputmode="decimal">
    </div>
    <label class="lbl">Note</label>
    <textarea id="edit-comment" rows="2" style="margin-bottom:0"></textarea>
    <div class="mactions">
      <button class="delbtn" onclick="deleteExp()">Delete</button>
      <button class="updbtn" onclick="updateExp()">Update</button>
    </div>
  </div>
</div>

<script>
const CATS=[
  {id:'transport',label:'Transport',icon:'🚌',subs:['Auto','Bus','Petrol','Train','Cab']},
  {id:'food',label:'Food',icon:'🍱',subs:['Groceries','Restaurant','Snacks','Tea/Coffee']},
  {id:'shopping',label:'Shopping',icon:'🛍️',subs:['Clothes','Electronics','Online','Hardware']},
  {id:'beauty',label:'Beauty',icon:'💇‍♂️',subs:['Haircut','Makeup']},
  {id:'health',label:'Health',icon:'💊',subs:['Medicine','Doctor','Gym']},
  {id:'entertainment',label:'Fun',icon:'🎮',subs:['Movies','OTT','Games']},
  {id:'service',label:'Service Fees',icon:'🏠',subs:['Service Charge']},
  {id:'bills',label:'Bills',icon:'⚡',subs:['Electricity','Mobile','Internet','Water']},
  {id:'gifting',label:'Gifting',icon:'🎁',subs:['Birthday','Wedding','Festival']},
  {id:'tax',label:'Tax',icon:'💼',subs:['Income Tax','Property Tax']},
  {id:'extra',label:'Extra',icon:'📦',subs:['Miscellaneous']},
];

let db,selCat='',selSub='',editId=null,editCat='',editSub='',activeFilter='all';

/* ── IndexedDB ── */
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('kharcha_db',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('expenses')){
        const s=d.createObjectStore('expenses',{keyPath:'id',autoIncrement:true});
        s.createIndex('date','date');
      }
    };
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e);
  });
}
const store=(mode)=>db.transaction('expenses',mode).objectStore('expenses');
function dbAll(){return new Promise(r=>{const q=store('readonly').getAll();q.onsuccess=()=>r(q.result);})}
function dbAdd(o){return new Promise(r=>{const q=store('readwrite').add(o);q.onsuccess=()=>r(q.result);})}
function dbPut(o){return new Promise(r=>{store('readwrite').put(o).onsuccess=()=>r();})}
function dbDel(id){return new Promise(r=>{store('readwrite').delete(id).onsuccess=()=>r();})}
function dbGet(id){return new Promise(r=>{const q=store('readonly').get(id);q.onsuccess=()=>r(q.result);})}

/* ── Dates ── */
function toStr(d){return d.toISOString().split('T')[0]}
function todayStr(){return toStr(new Date())}
function yestStr(){const d=new Date();d.setDate(d.getDate()-1);return toStr(d)}
function fmtLong(s){return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
function fmtShort(s){return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
function fmtAmt(n){return '₹'+Number(n).toLocaleString('en-IN')}

function setDate(p){
  const v=p==='today'?todayStr():yestStr();
  document.getElementById('expense-date').value=v;
  document.getElementById('date-disp-text').textContent=fmtLong(v);
  document.getElementById('btn-today').classList.toggle('active',p==='today');
  document.getElementById('btn-yesterday').classList.toggle('active',p==='yesterday');
}
function pickDate(){
  const inp=document.getElementById('expense-date');
  try{inp.showPicker();}catch(e){inp.click();}
}
function onDatePick(){
  const v=document.getElementById('expense-date').value;
  if(!v)return;
  document.getElementById('date-disp-text').textContent=fmtLong(v);
  document.getElementById('btn-today').classList.remove('active');
  document.getElementById('btn-yesterday').classList.remove('active');
}

/* ── Categories ── */
function buildCats(gridId,selFn,getVal){
  const g=document.getElementById(gridId);
  if(!g)return;
  g.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.type='button';
    b.className='catbtn'+(getVal()===c.id?' sel':'');
    b.innerHTML='<span class="cico">'+c.icon+'</span><span>'+c.label+'</span>';
    b.addEventListener('click',()=>selFn(c.id));
    g.appendChild(b);
  });
}
function buildSubs(rowId,subs,cur,onSel){
  const row=document.getElementById(rowId);
  if(!row)return;
  row.innerHTML='';
  (subs||[]).forEach(s=>{
    const b=document.createElement('button');
    b.type='button';
    b.className='scbtn'+(cur===s?' sel':'');
    b.textContent=s;
    b.addEventListener('click',()=>{
      onSel(s);
      row.querySelectorAll('.scbtn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
    });
    row.appendChild(b);
  });
}
function selCatFn(id){
  selCat=id;selSub='';
  buildCats('cat-grid',selCatFn,()=>selCat);
  const cat=CATS.find(c=>c.id===id);
  const wrap=document.getElementById('subcat-wrap');
  if(cat&&cat.subs.length){
    wrap.style.display='block';
    buildSubs('subcat-row',cat.subs,'',s=>{selSub=s;});
  } else wrap.style.display='none';
}
function selEditCatFn(id){
  editCat=id;editSub='';
  buildCats('edit-cat-grid',selEditCatFn,()=>editCat);
  const cat=CATS.find(c=>c.id===id);
  buildSubs('edit-subcat-row',cat?cat.subs:[],editSub,s=>{editSub=s;});
}

/* ── Save ── */
async function saveExpense(){
  const date=document.getElementById('expense-date').value;
  const amount=parseFloat(document.getElementById('expense-amount').value);
  const comment=document.getElementById('expense-comment').value.trim();
  const btn=document.getElementById('save-btn');
  if(!date||!selCat||!amount||amount<=0){
    btn.textContent='Fill date, category & amount';btn.classList.add('err');
    setTimeout(()=>{btn.textContent='Save Expense';btn.classList.remove('err');},2200);
    return;
  }
  await dbAdd({date,category:selCat,sub_category:selSub,amount,comment,
    synced:0,deleted:0,created_at:new Date().toISOString(),updated_at:new Date().toISOString()});
  btn.textContent='✓ Saved!';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='Save Expense';btn.classList.remove('ok');},1500);
  document.getElementById('expense-amount').value='';
  document.getElementById('expense-comment').value='';
  selCat='';selSub='';
  buildCats('cat-grid',selCatFn,()=>selCat);
  document.getElementById('subcat-wrap').style.display='none';
  updateStats();
}

/* ── History ── */
async function renderHistory(){
  const all=await dbAll();
  all.sort((a,b)=>b.date.localeCompare(a.date)||(b.id-a.id));
  const list=document.getElementById('history-list');
  const data=(activeFilter==='all'?all:all.filter(e=>e.category===activeFilter)).filter(e=>!e.deleted);
  if(!data.length){list.innerHTML='<div class="empty">📭 No expenses yet</div>';return;}
  const groups={};
  data.forEach(e=>{(groups[e.date]=groups[e.date]||[]).push(e);});
  list.innerHTML='';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const items=groups[date];
    const total=items.reduce((s,e)=>s+e.amount,0);
    const g=document.createElement('div');g.className='dgrp';
    g.innerHTML='<div class="dhdr"><span>'+fmtShort(date)+'</span><span style="color:var(--text2);font-size:12px;letter-spacing:0">'+fmtAmt(total)+'</span></div>';
    items.forEach(e=>{
      const cat=CATS.find(c=>c.id===e.category)||{icon:'📦',label:e.category};
      const card=document.createElement('div');card.className='ecard';
      card.innerHTML=
        '<div class="eico cat-'+e.category+'">'+cat.icon+'</div>'+
        '<div class="einfo">'+
          '<div class="ename">'+cat.label+(e.sub_category?' · '+e.sub_category:'')+'</div>'+
          '<div class="esub">'+(e.comment||'—')+'</div>'+
        '</div>'+
        '<div class="eamt">'+fmtAmt(e.amount)+'</div>'+
        '<div class="sdot'+(e.synced?' ok':'')+'"></div>';
      card.addEventListener('click',()=>openEdit(e));
      g.appendChild(card);
    });
    list.appendChild(g);
  });
}
function buildFilters(){
  const bar=document.getElementById('filter-bar');bar.innerHTML='';
  const mk=(id,label)=>{
    const b=document.createElement('button');
    b.className='fpill'+(activeFilter===id?' active':'');
    b.textContent=label;
    b.addEventListener('click',()=>{activeFilter=id;buildFilters();renderHistory();});
    bar.appendChild(b);
  };
  mk('all','All');
  CATS.forEach(c=>mk(c.id,c.icon+' '+c.label));
}

/* ── Edit ── */
async function openEdit(e){
  editId=e.id;editCat=e.category;editSub=e.sub_category||'';
  document.getElementById('edit-date').value=e.date;
  document.getElementById('edit-amount').value=e.amount;
  document.getElementById('edit-comment').value=e.comment||'';
  buildCats('edit-cat-grid',selEditCatFn,()=>editCat);
  const cat=CATS.find(c=>c.id===e.category);
  buildSubs('edit-subcat-row',cat?cat.subs:[],editSub,s=>{editSub=s;});
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal(){document.getElementById('edit-modal').classList.remove('open');editId=null;}
function overlayClick(ev){if(ev.target.id==='edit-modal')closeModal();}
async function updateExp(){
  if(!editId)return;
  const rec=await dbGet(editId);
  rec.date=document.getElementById('edit-date').value;
  rec.category=editCat;rec.sub_category=editSub;
  rec.amount=parseFloat(document.getElementById('edit-amount').value)||rec.amount;
  rec.comment=document.getElementById('edit-comment').value.trim();
  rec.synced=0;rec.updated_at=new Date().toISOString();
  await dbPut(rec);closeModal();renderHistory();updateStats();
}
async function deleteExp(){
  if(!editId||!confirm('Delete this expense?'))return;
  const rec=await dbGet(editId);
  rec.deleted=1;rec.synced=0;rec.updated_at=new Date().toISOString();
  await dbPut(rec);closeModal();renderHistory();updateStats();
}

/* ── Sync ── */
async function updateStats(){
  const all=await dbAll();
  const active=all.filter(e=>!e.deleted);
  const pend=all.filter(e=>!e.synced).length;
  document.getElementById('stat-total').textContent=active.length;
  const pe=document.getElementById('stat-pending');
  pe.textContent=pend;
  pe.style.color=pend>0?'var(--warn)':'var(--success)';
}
function saveUrl(){
  let url=document.getElementById('server-url').value.trim().replace(/\/+$/,'');
  if(url&&!url.startsWith('http'))url='http://'+url;
  if(url){localStorage.setItem('kharcha_server',url);document.getElementById('server-url').value=url;}
  syncMsg('Saved: '+url,'ok');
}
async function doSync(){
  const inputVal=document.getElementById('server-url').value.trim();
  let url=inputVal||localStorage.getItem('kharcha_server');
  if(!url){syncMsg('Enter server URL above first','err');return;}
  if(!url.startsWith('http'))url='http://'+url;
  url=url.replace(/\/+$/,'');
  syncMsg('Connecting...','info');
  const all=await dbAll();
  const toDelete=all.filter(e=>e.deleted&&!e.synced);
  const toUpsert=all.filter(e=>!e.deleted&&!e.synced);
  if(!toDelete.length&&!toUpsert.length){syncMsg('Nothing to sync — all up to date!','ok');return;}
  try{
    if(toDelete.length){
      const res=await fetch(url+'/delete',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({created_ats:toDelete.map(e=>e.created_at)})});
      if(res.ok){for(const e of toDelete)await dbDel(e.id);}
      else{syncMsg('Delete error: '+res.status,'err');return;}
    }
    if(toUpsert.length){
      const res=await fetch(url+'/sync',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({expenses:toUpsert})});
      if(res.ok){for(const e of toUpsert){e.synced=1;await dbPut(e);}}
      else{syncMsg('Sync error: '+res.status,'err');return;}
    }
    const now=new Date().toISOString();
    localStorage.setItem('kharcha_last_sync',now);
    document.getElementById('stat-last').textContent=new Date(now).toLocaleString('en-IN');
    syncMsg('✓ Synced '+toUpsert.length+' record(s), deleted '+toDelete.length,'ok');
    updateStats();
  }catch(e){syncMsg('Cannot reach server — are you on same WiFi?','err');}
}
async function exportJSON(){
  const all=await dbAll();
  const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='kharcha_backup_'+todayStr()+'.json';a.click();
}
function syncMsg(msg,type){
  document.getElementById('sync-msg').innerHTML='<div class="stmsg '+type+'">'+msg+'</div>';
}

/* ── Nav ── */
function show(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='history'){buildFilters();renderHistory();}
  if(name==='sync'){
    updateStats();
    const u=localStorage.getItem('kharcha_server');
    if(u)document.getElementById('server-url').value=u;
    const ls=localStorage.getItem('kharcha_last_sync');
    if(ls)document.getElementById('stat-last').textContent=new Date(ls).toLocaleString('en-IN');
  }
}

/* ── Init ── */
async function init(){
  try{
    db=await openDB();
    setDate('today');
    buildCats('cat-grid',selCatFn,()=>selCat);
    updateStats();
  }catch(e){
    document.body.innerHTML='<div style="padding:20px;color:#ff4757;font-family:sans-serif">DB Error: '+e.message+'<br><br>Try clearing Chrome site data for this page.</div>';
  }
}
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    const base=location.pathname.replace(/\/[^\/]*$/, '/');
    navigator.serviceWorker.register(base+'sw.js').then(reg=>{
      console.log('SW registered');
    }).catch(err=>console.warn('SW failed:',err));
  });
}
init();
</script>
